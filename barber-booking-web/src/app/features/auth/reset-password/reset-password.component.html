<div class="auth-container">
  <div class="auth-card">

    <!-- Icon -->
    <div class="icon-wrap">
      <svg viewBox="0 0 24 24" fill="currentColor" width="28" height="28">
        <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/>
      </svg>
    </div>

    <!-- Header -->
    <div class="card-header">
      <span class="card-kicker">New Password</span>
      <h2>Reset Password</h2>
      <p>Choose a strong new password for your account.</p>
    </div>

    <!-- Success -->
    <div *ngIf="success" class="alert alert-success" role="alert">
      <div class="alert-icon-box">
        <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
          <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
        </svg>
      </div>
      <div class="alert-content">
        <span class="alert-title">Password Reset!</span>
        <span class="alert-desc">Your password has been updated. Redirecting you to login...</span>
      </div>
    </div>

    <!-- Error -->
    <div *ngIf="error && !success" class="alert alert-error" role="alert">
      <div class="alert-icon-box">
        <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
        </svg>
      </div>
      <div class="alert-content">{{ error }}</div>
    </div>

    <!-- Form -->
    <form *ngIf="!success" [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>

      <!-- New password -->
      <div class="form-group" [class.has-error]="submitted && f['password'].invalid">
        <label for="rp-password">New Password</label>
        <div class="input-wrapper">
          <span class="input-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
          </span>
          <input [type]="showPassword ? 'text' : 'password'" id="rp-password" formControlName="password" placeholder="Minimum 8 characters" autocomplete="new-password"/>
          <button type="button" class="toggle-password" (click)="showPassword = !showPassword" aria-label="Toggle password">
            <svg *ngIf="!showPassword" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
            <svg *ngIf="showPassword" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>
        <span *ngIf="submitted && f['password'].errors?.['required']" class="error-message">Password is required.</span>
        <span *ngIf="submitted && f['password'].errors?.['minlength']" class="error-message">Password must be at least 8 characters.</span>
      </div>

      <!-- Confirm password -->
      <div class="form-group" [class.has-error]="submitted && (f['password_confirmation'].invalid || form.errors?.['mismatch'])">
        <label for="rp-confirm">Confirm New Password</label>
        <div class="input-wrapper">
          <span class="input-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
          </span>
          <input [type]="showConfirm ? 'text' : 'password'" id="rp-confirm" formControlName="password_confirmation" placeholder="Repeat your new password" autocomplete="new-password"/>
          <button type="button" class="toggle-password" (click)="showConfirm = !showConfirm" aria-label="Toggle confirm password">
            <svg *ngIf="!showConfirm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
            <svg *ngIf="showConfirm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>
        <span *ngIf="submitted && f['password_confirmation'].errors?.['required']" class="error-message">Please confirm your password.</span>
        <span *ngIf="submitted && !f['password_confirmation'].errors?.['required'] && form.errors?.['mismatch']" class="error-message">Passwords do not match.</span>
      </div>

      <button type="submit" class="btn-submit" [disabled]="loading || !!error && !form.touched">
        <span *ngIf="!loading">Reset Password</span>
        <span *ngIf="loading" class="btn-loading"><span class="spinner"></span> Resetting...</span>
      </button>
    </form>

    <!-- Footer -->
    <div class="card-footer">
      <a routerLink="/auth/login">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="14" height="14" style="vertical-align: middle; margin-right: 4px;">
          <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
        </svg>
        Back to Sign In
      </a>
    </div>

  </div>
</div>
