<div class="bottom-nav">
  <div class="nav-container">
    <div 
      class="nav-item" 
      *ngFor="let item of navItems"
      [class.active]="activeTab === item.id"
      (click)="navigate(item.route)"
    >
      <div class="nav-icon">
        <svg class="icon-svg" viewBox="0 0 24 24" fill="currentColor">
          <path [attr.d]="getIconPath(item.icon)"/>
        </svg>
      </div>
      <div class="nav-label">{{ item.labelKey | translate }}</div>
      <div class="nav-indicator" *ngIf="activeTab === item.id"></div>
    </div>
    
  </div>
</div>
