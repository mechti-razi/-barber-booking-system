<nav class="top-nav" *ngIf="!isBarberArea">
  <div class="top-nav-inner">

    <!-- ── LEFT: Brand ─────────────────────────────────── -->
    <div class="brand">
      <div class="brand-logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round" class="brand-logo-svg">
          <circle cx="6" cy="6" r="3"></circle>
          <circle cx="6" cy="18" r="3"></circle>
          <line x1="9.8" y1="8.2" x2="21" y2="12.6"></line>
          <line x1="9.8" y1="15.8" x2="21" y2="11.4"></line>
        </svg>
      </div>
      <div class="brand-info">
        <span class="brand-name">BarberBook</span>
        <span class="brand-tag">{{ 'nav.client' | translate }}</span>
      </div>
    </div>

    <!-- ── CENTER: Nav Links ────────────────────────────── -->
    <nav class="links">
      <a routerLink="/home" routerLinkActive="active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
          <polyline points="9 22 9 12 15 12 15 22"></polyline>
        </svg>
        <span>{{ 'nav.home' | translate }}</span>
      </a>
      <a routerLink="/shops" routerLinkActive="active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 3h18l-2 9H5L3 3z"></path>
          <path d="M8 12v9m8-9v9"></path>
          <path d="M1 3h22"></path>
        </svg>
        <span>{{ 'nav.shops' | translate }}</span>
      </a>
      <a routerLink="/appointments" routerLinkActive="active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
          <line x1="16" y1="2" x2="16" y2="6"></line>
          <line x1="8" y1="2" x2="8" y2="6"></line>
          <line x1="3" y1="10" x2="21" y2="10"></line>
        </svg>
        <span>{{ 'nav.appointments' | translate }}</span>
      </a>
      <a routerLink="/profile" routerLinkActive="active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
          <circle cx="12" cy="7" r="4"></circle>
        </svg>
        <span>{{ 'nav.profile' | translate }}</span>
      </a>
    </nav>

    <!-- ── RIGHT: Controls + User ──────────────────────── -->
    <div class="right-zone">

      <!-- Utility Controls -->
      <div class="controls">
        <!-- Theme Toggle -->
        <button class="ctrl-btn" (click)="toggleTheme()"
          [title]="isDarkMode ? ('Switch to Light') : ('Switch to Dark')">
          <svg *ngIf="isDarkMode" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
          </svg>
          <svg *ngIf="!isDarkMode" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
        </button>

        <!-- Language Toggle -->
        <button class="ctrl-btn lang-btn" (click)="toggleLang()" title="Toggle language">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="2" y1="12" x2="22" y2="12"></line>
            <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
          </svg>
          <span>{{ currentLang === 'en' ? 'FR' : 'EN' }}</span>
        </button>
      </div>

      <!-- Divider -->
      <div class="divider" *ngIf="isLoggedIn"></div>

      <!-- User Card (avatar + name + logout) -->
      <div class="user-card" *ngIf="isLoggedIn && currentUser">
        <div class="user-avatar">{{ getInitials(currentUser?.name) }}</div>
        <div class="user-details">
          <span class="user-name">{{ currentUser?.name }}</span>
          <span class="user-role">{{ 'nav.client' | translate }}</span>
        </div>
        <button class="logout-btn" (click)="logout()" [title]="'nav.signOut' | translate">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
            <polyline points="16 17 21 12 16 7"></polyline>
            <line x1="21" y1="12" x2="9" y2="12"></line>
          </svg>
        </button>
      </div>

    </div>

  </div>
</nav>
